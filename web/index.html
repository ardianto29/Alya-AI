<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alya</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #0a0712;
    --bg-1: #15101f;
    --bg-2: #1d162c;
    --border: rgba(192, 132, 252, 0.12);
    --border-strong: rgba(192, 132, 252, 0.3);
    --text: #f3e8ff;
    --text-dim: #c4b5d4;
    --text-muted: #7c7191;
    --accent: #c084fc;
    --accent-soft: #a855f7;
    --accent-glow: rgba(192, 132, 252, 0.4);
    --user-grad-1: #4c2d8c;
    --user-grad-2: #6b21a8;
    --alya-bg: rgba(192, 132, 252, 0.06);
    --danger: #f87171;
    --success: #4ade80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background:
      radial-gradient(ellipse 80% 50% at 20% 0%, rgba(168, 85, 247, 0.15), transparent),
      radial-gradient(ellipse 60% 50% at 80% 100%, rgba(236, 72, 153, 0.08), transparent),
      var(--bg-0);
    color: var(--text);
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* HEADER */
  header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(21, 16, 31, 0.6);
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    gap: 14px;
    z-index: 10;
  }
  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c084fc, #ec4899);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
    color: white;
    box-shadow: 0 0 20px var(--accent-glow);
    position: relative;
    overflow: hidden;
  }
  .avatar img,
  .big-avatar img,
  .msg-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: inherit;
    display: block;
  }
  .msg-avatar { overflow: hidden; }
  .big-avatar { overflow: hidden; }
  .avatar::after {
    content: '';
    position: absolute;
    bottom: 0;
    right: 0;
    width: 12px;
    height: 12px;
    background: var(--success);
    border: 2px solid var(--bg-1);
    border-radius: 50%;
  }
  .title-block { flex: 1; }
  .title-block h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .title-block .sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
    font-family: 'JetBrains Mono', monospace;
  }
  .header-actions { display: flex; gap: 8px; }
  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    font-weight: 500;
    transition: all 0.15s;
  }
  .btn-ghost:hover {
    color: var(--text);
    border-color: var(--border-strong);
    background: rgba(192, 132, 252, 0.05);
  }

  /* MESSAGES */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 32px 24px 16px;
    scroll-behavior: smooth;
  }
  main::-webkit-scrollbar { width: 8px; }
  main::-webkit-scrollbar-track { background: transparent; }
  main::-webkit-scrollbar-thumb {
    background: var(--border-strong);
    border-radius: 4px;
  }
  main::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  .conversation {
    max-width: 820px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .big-avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c084fc, #ec4899);
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 700;
    color: white;
    box-shadow: 0 0 40px var(--accent-glow);
  }
  .empty-state h2 {
    font-size: 20px;
    color: var(--text);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .empty-state p {
    font-size: 13px;
    line-height: 1.6;
  }

  .msg-row {
    display: flex;
    gap: 12px;
    animation: slideIn 0.3s ease-out;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 12px;
    color: white;
  }
  .msg-row.alya .msg-avatar {
    background: linear-gradient(135deg, #c084fc, #ec4899);
  }
  .msg-row.user .msg-avatar {
    background: linear-gradient(135deg, #4c2d8c, #1e1b4b);
    color: var(--text-dim);
  }

  .msg-content {
    max-width: 75%;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .msg-row.user .msg-content { align-items: flex-end; }

  .msg-meta {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    padding: 0 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .msg-bubble {
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.6;
    font-size: 14.5px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg-row.alya .msg-bubble {
    background: var(--alya-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }
  .msg-row.user .msg-bubble {
    background: linear-gradient(135deg, var(--user-grad-1), var(--user-grad-2));
    border-top-right-radius: 4px;
    color: white;
    box-shadow: 0 2px 12px rgba(76, 45, 140, 0.3);
  }
  .msg-bubble.error {
    background: rgba(248, 113, 113, 0.08);
    border-color: rgba(248, 113, 113, 0.3);
    color: var(--danger);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* TYPING INDICATOR */
  .typing-dots {
    display: inline-flex;
    gap: 4px;
    padding: 4px 0;
  }
  .typing-dots span {
    width: 7px;
    height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* STREAMING CURSOR */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.9s infinite;
  }
  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  /* FOOTER / INPUT */
  footer {
    border-top: 1px solid var(--border);
    background: rgba(21, 16, 31, 0.6);
    backdrop-filter: blur(20px);
    padding: 16px 24px 20px;
  }
  .input-wrap {
    max-width: 820px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-container {
    flex: 1;
    position: relative;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .input-container:focus-within {
    border-color: var(--border-strong);
    box-shadow: 0 0 0 3px rgba(192, 132, 252, 0.08);
  }
  #input {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    padding: 14px 16px;
    font-size: 14.5px;
    font-family: inherit;
    resize: none;
    min-height: 48px;
    max-height: 200px;
    outline: none;
    line-height: 1.5;
  }
  #input::placeholder { color: var(--text-muted); }

  #send {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--accent), var(--accent-soft));
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 12px rgba(192, 132, 252, 0.25);
  }
  #send:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(192, 132, 252, 0.4);
  }
  #send:active:not(:disabled) { transform: translateY(0); }
  #send:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    box-shadow: none;
  }
  #send svg { width: 20px; height: 20px; }

  #mic {
    width: 48px;
    height: 48px;
    background: var(--bg-2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  #mic:hover:not(:disabled) {
    border-color: var(--border-strong);
    color: var(--text);
  }
  #mic.listening {
    background: linear-gradient(135deg, #34d399, #10b981);
    border-color: transparent;
    color: white;
    box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.18);
  }
  #mic.speaking-user {
    background: linear-gradient(135deg, #f43f5e, #be123c);
    border-color: transparent;
    color: white;
    box-shadow: 0 0 0 4px rgba(244, 63, 94, 0.20);
    animation: micPulse 1.1s ease-in-out infinite;
  }
  #mic.processing {
    background: rgba(192, 132, 252, 0.12);
    border-color: var(--border-strong);
    color: var(--accent);
    cursor: progress;
  }
  #mic.alya-speaking {
    background: linear-gradient(135deg, #c084fc, #a855f7);
    border-color: transparent;
    color: white;
    box-shadow: 0 0 0 4px rgba(192, 132, 252, 0.22);
    animation: micPulse 1.4s ease-in-out infinite;
  }
  #mic:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  #mic svg { width: 20px; height: 20px; }
  @keyframes micPulse {
    0%, 100% { box-shadow: 0 0 0 4px currentColor; }
    50%      { box-shadow: 0 0 0 10px transparent; }
  }
  .voice-status {
    max-width: 820px;
    margin: 6px auto 0;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .voice-status.show { opacity: 1; }
  .voice-level {
    display: inline-block;
    width: 120px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    vertical-align: middle;
  }
  .voice-level > span {
    display: block;
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #34d399, #f59e0b, #f43f5e);
    transition: width 0.08s linear;
  }

  /* ===== Voice-only mode =====
     Aktif kalau <body class="voice-only">. Sembunyiin textarea + tombol send
     + hint typing, perbesar tombol mic biar jadi focal point. Code-nya tetep
     ada — hapus class "voice-only" di tag <body> kalau mau typing balik. */
  body.voice-only .input-container,
  body.voice-only #send,
  body.voice-only .hint {
    display: none;
  }
  body.voice-only .input-wrap {
    justify-content: center;
  }
  body.voice-only #mic {
    width: 88px;
    height: 88px;
    border-radius: 50%;
  }
  body.voice-only #mic svg { width: 34px; height: 34px; }
  body.voice-only .mic-spinner { width: 28px; height: 28px; border-width: 3px; }
  body.voice-only .voice-status {
    font-size: 13px;
    height: 24px;
    margin-top: 12px;
  }
  body.voice-only .voice-level { width: 200px; height: 5px; }
  body.voice-only footer { padding: 22px 24px 26px; }
  .mic-spinner {
    width: 18px;
    height: 18px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hint {
    max-width: 820px;
    margin: 8px auto 0;
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
  }

  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    main { padding: 20px 12px 12px; }
    footer { padding: 12px 16px 16px; }
    .msg-content { max-width: 82%; }
    .title-block h1 { font-size: 14px; }
    .title-block .sub { font-size: 10px; }
  }
</style>
</head>
<body class="voice-only">
<header>
  <div class="avatar" id="headerAvatar">A</div>
  <div class="title-block">
    <h1>Alya Mikhailovna</h1>
    <div class="sub" id="meta">connecting…</div>
  </div>
  <div class="header-actions">
    <button class="btn-ghost" id="modeToggle" title="Toggle mode (voice-only / full chat)">Mode: …</button>
    <button class="btn-ghost" id="reset" title="Clear conversation">Reset</button>
  </div>
</header>

<main id="main">
  <div class="conversation" id="conversation">
    <div class="empty-state" id="empty">
      <div class="big-avatar" id="emptyAvatar">A</div>
      <h2>Hai…</h2>
      <p>
        Ngobrol apa hari ini?<br />
        <span style="opacity: 0.6">Inference: PC LM Studio · History: in-memory laptop</span>
      </p>
    </div>
  </div>
</main>

<footer>
  <div class="input-wrap">
    <div class="input-container">
      <textarea id="input" placeholder="Ketik pesan ke Alya…" rows="1"></textarea>
    </div>
    <button id="mic" title="Klik untuk mulai voice chat (Ctrl+M)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
        <line x1="12" y1="19" x2="12" y2="23"></line>
        <line x1="8" y1="23" x2="16" y2="23"></line>
      </svg>
    </button>
    <button id="send" title="Kirim (Enter)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="voice-status" id="voiceStatus">
    <span id="voiceStatusText">listening…</span>
    <span class="voice-level"><span id="voiceLevelBar"></span></span>
  </div>
  <div class="hint">Enter untuk kirim · Shift+Enter baris baru · 🎙 atau Ctrl+M untuk voice chat (auto-VAD)</div>
</footer>

<script>
  const conv = document.getElementById('conversation');
  const main = document.getElementById('main');
  const empty = document.getElementById('empty');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const micBtn = document.getElementById('mic');
  const resetBtn = document.getElementById('reset');
  const modeToggleBtn = document.getElementById('modeToggle');
  const metaEl = document.getElementById('meta');
  const micIconHTML = micBtn.innerHTML;

  // ===== Mode toggle (voice-only ↔ full chat) — persist di localStorage =====
  const MODE_KEY = 'alya:uiMode';
  function applyMode(mode) {
    if (mode === 'voice') {
      document.body.classList.add('voice-only');
      modeToggleBtn.textContent = 'Mode: 🎙 voice';
    } else {
      document.body.classList.remove('voice-only');
      modeToggleBtn.textContent = 'Mode: 💬 full';
    }
    try { localStorage.setItem(MODE_KEY, mode); } catch (_) {}
  }
  // Default: pakai pilihan terakhir, atau 'voice' kalau pertama kali
  applyMode(localStorage.getItem(MODE_KEY) || 'voice');
  modeToggleBtn.addEventListener('click', () => {
    const current = document.body.classList.contains('voice-only') ? 'voice' : 'full';
    applyMode(current === 'voice' ? 'full' : 'voice');
  });

  // ===== Alya avatar (foto profil dari config/images/) =====
  // Probe /api/avatar sekali pas load. Kalau ada, isi <img> ke semua avatar slot
  // Alya. Kalau 404, fallback ke huruf "A" yang udah ada di markup.
  let avatarHTML = ''; // diisi pas avatar ke-load berhasil
  (function loadAvatar() {
    const img = new Image();
    img.onload = () => {
      avatarHTML = `<img src="/api/avatar" alt="Alya" draggable="false" />`;
      document.getElementById('headerAvatar').innerHTML = avatarHTML;
      const empt = document.getElementById('emptyAvatar');
      if (empt) empt.innerHTML = avatarHTML;
      // Existing alya msg-avatars in DOM (kalau ada history) — refresh juga
      document.querySelectorAll('.msg-row.alya .msg-avatar').forEach((el) => {
        el.innerHTML = avatarHTML;
      });
    };
    img.onerror = () => { /* keep letter fallback */ };
    img.src = '/api/avatar';
  })();

  function timeStr() {
    const d = new Date();
    return d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
  }

  function hideEmpty() {
    if (empty && empty.parentNode) empty.remove();
  }

  function makeRow(role, label) {
    hideEmpty();
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    const avatarContent = role === 'user' ? 'Y' : (avatarHTML || 'A');
    row.innerHTML = `
      <div class="msg-avatar">${avatarContent}</div>
      <div class="msg-content">
        <div class="msg-meta">${label} · ${timeStr()}</div>
        <div class="msg-bubble"></div>
      </div>
    `;
    conv.appendChild(row);
    scrollBottom();
    return row.querySelector('.msg-bubble');
  }

  function scrollBottom() {
    requestAnimationFrame(() => {
      main.scrollTop = main.scrollHeight;
    });
  }

  function showTyping(bubble) {
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  }

  async function refreshMeta() {
    try {
      const r = await fetch('/api/state');
      if (!r.ok) throw new Error();
      const s = await r.json();
      metaEl.textContent = `${s.model} · ${s.history_messages} pesan`;
    } catch {
      metaEl.textContent = 'server unreachable';
    }
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    const userBubble = makeRow('user', 'You');
    userBubble.textContent = text;

    const alyaBubble = makeRow('alya', 'Alya');
    showTyping(alyaBubble);

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      let firstChunk = true;

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        if (!chunk) continue;
        if (firstChunk) {
          alyaBubble.innerHTML = '';
          firstChunk = false;
        }
        buf += chunk;
        alyaBubble.textContent = buf;
        const cur = document.createElement('span');
        cur.className = 'cursor';
        alyaBubble.appendChild(cur);
        scrollBottom();
      }
      const cursor = alyaBubble.querySelector('.cursor');
      if (cursor) cursor.remove();
      if (!buf.trim()) {
        alyaBubble.textContent = '(kosong — coba lagi)';
        alyaBubble.classList.add('error');
      }
      refreshMeta();
    } catch (e) {
      alyaBubble.innerHTML = '';
      alyaBubble.textContent = `error: ${e.message}`;
      alyaBubble.classList.add('error');
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      // While voice chat aktif & input kosong → Enter = paksa kirim hasil rekaman
      if (convoActive && !inputEl.value.trim() &&
          (micState === 'listening' || micState === 'speaking')) {
        pendingEndpoint = true;
        return;
      }
      sendMessage();
    }
  });
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
  });
  sendBtn.addEventListener('click', sendMessage);

  // ===== Voice chat (toggle + VAD + conversation loop) =====
  const voiceStatus = document.getElementById('voiceStatus');
  const voiceStatusText = document.getElementById('voiceStatusText');
  const voiceLevelBar = document.getElementById('voiceLevelBar');

  const SILENCE_MS = 1000;          // ms of silence after speech → endpoint
  const MIN_SPEECH_MS = 300;        // ignore blips shorter than this
  const MAX_RECORDING_MS = 30000;   // safety cutoff
  const RMS_SPEECH = 0.010;         // RMS threshold to consider "speech" (lowered for headset mics)
  const RMS_SILENCE = 0.006;        // hysteresis: RMS below this = silence
  const POST_TTS_DELAY_MS = 600;    // pause before re-listening after Alya done (let speakers/echo settle)
  const VAD_WARMUP_MS = 400;        // ignore audio level for first N ms after re-listen (echo tail dies)

  let convoActive = false;
  let micState = 'idle'; // idle | listening | speaking | processing | chatting | alya
  let convoStream = null;
  let mediaRecorder = null;
  let recordedChunks = [];
  let recordMime = '';
  let audioCtx = null;
  let analyser = null;
  let vadFrame = null;
  let speechStartedAt = 0;
  let silenceStartedAt = 0;
  let hasSpoken = false;
  let recStart = 0;
  let abortCtl = null;
  let currentAudio = null;
  let pendingEndpoint = false; // user pressed Enter → force endpoint when chunk ready

  function pickMime() {
    const cands = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4'];
    for (const t of cands) {
      if (window.MediaRecorder && MediaRecorder.isTypeSupported(t)) return t;
    }
    return '';
  }

  function setStatus(state, text) {
    micState = state;
    micBtn.classList.remove('listening', 'speaking-user', 'processing', 'alya-speaking');
    if (state === 'listening')       micBtn.classList.add('listening');
    else if (state === 'speaking')   micBtn.classList.add('speaking-user');
    else if (state === 'processing' || state === 'chatting') micBtn.classList.add('processing');
    else if (state === 'alya')       micBtn.classList.add('alya-speaking');

    if (state === 'idle') {
      micBtn.innerHTML = micIconHTML;
      micBtn.title = 'Klik untuk mulai voice chat (Ctrl+M)';
      voiceStatus.classList.remove('show');
    } else {
      voiceStatus.classList.add('show');
      micBtn.title = 'Klik untuk berhenti voice chat (Ctrl+M)';
      micBtn.innerHTML = (state === 'processing' || state === 'chatting')
        ? '<div class="mic-spinner"></div>' : micIconHTML;
    }
    voiceStatusText.textContent = text || state;
  }

  async function ensureStream() {
    if (convoStream) return;
    try {
      convoStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
      });
    } catch (e) {
      alert('Mic permission ditolak atau ga ada device: ' + e.message);
      throw e;
    }
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(convoStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    source.connect(analyser);
  }

  function releaseStream() {
    if (vadFrame) { cancelAnimationFrame(vadFrame); vadFrame = null; }
    if (convoStream) {
      convoStream.getTracks().forEach((t) => t.stop());
      convoStream = null;
    }
    if (audioCtx) {
      try { audioCtx.close(); } catch (_) {}
      audioCtx = null;
      analyser = null;
    }
    voiceLevelBar.style.width = '0%';
  }

  function rmsLevel() {
    if (!analyser) return 0;
    const buf = new Uint8Array(analyser.fftSize);
    analyser.getByteTimeDomainData(buf);
    let sum = 0;
    for (let i = 0; i < buf.length; i++) {
      const v = (buf[i] - 128) / 128;
      sum += v * v;
    }
    return Math.sqrt(sum / buf.length);
  }

  function startVadLoop() {
    hasSpoken = false;
    speechStartedAt = 0;
    silenceStartedAt = 0;
    recStart = Date.now();
    pendingEndpoint = false;
    let peakRms = 0;
    let lastLog = Date.now();

    function tick() {
      if (micState !== 'listening' && micState !== 'speaking') return;
      const rms = rmsLevel();
      voiceLevelBar.style.width = `${Math.min(100, rms * 600)}%`;
      const now = Date.now();
      if (rms > peakRms) peakRms = rms;
      if (now - lastLog > 1000) {
        console.debug(`[VAD] peak=${peakRms.toFixed(4)} ctxState=${audioCtx?.state} hasSpoken=${hasSpoken}`);
        peakRms = 0;
        lastLog = now;
      }
      // Warmup: abaikan input audio sebentar setelah re-listen
      // (echo tail TTS / codec init MediaRecorder bisa false-trigger VAD)
      if (now - recStart < VAD_WARMUP_MS) {
        vadFrame = requestAnimationFrame(tick);
        return;
      }
      if (rms > RMS_SPEECH) {
        if (!hasSpoken) {
          hasSpoken = true;
          speechStartedAt = now;
          setStatus('speaking', 'mendengar suara…');
        }
        silenceStartedAt = 0;
      } else if (rms < RMS_SILENCE && hasSpoken) {
        if (!silenceStartedAt) silenceStartedAt = now;
        if (now - silenceStartedAt >= SILENCE_MS && now - speechStartedAt >= MIN_SPEECH_MS) {
          triggerEndpoint('vad-silence');
          return;
        }
      }
      if (now - recStart > MAX_RECORDING_MS) {
        triggerEndpoint('max-duration');
        return;
      }
      if (pendingEndpoint && hasSpoken) {
        triggerEndpoint('manual-enter');
        return;
      }
      vadFrame = requestAnimationFrame(tick);
    }
    vadFrame = requestAnimationFrame(tick);
  }

  function startMediaRecorder() {
    recordMime = pickMime();
    const opts = recordMime ? { mimeType: recordMime } : {};
    mediaRecorder = new MediaRecorder(convoStream, opts);
    recordedChunks = [];
    mediaRecorder.ondataavailable = (e) => {
      if (e.data && e.data.size > 0) recordedChunks.push(e.data);
    };
    mediaRecorder.start();
  }

  function stopMediaRecorder() {
    return new Promise((resolve) => {
      if (!mediaRecorder || mediaRecorder.state === 'inactive') {
        resolve(null);
        return;
      }
      mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: recordMime || 'audio/webm' });
        resolve(blob);
      };
      mediaRecorder.stop();
    });
  }

  async function triggerEndpoint(_reason) {
    if (micState === 'processing' || micState === 'chatting' || micState === 'alya') return;
    setStatus('processing', 'mengirim…');
    const blob = await stopMediaRecorder();
    if (!blob || blob.size < 500) {
      if (convoActive) await beginListening();
      else exitConversation(true);
      return;
    }
    await processTurn(blob);
  }

  async function beginListening() {
    if (!convoActive) return;
    await ensureStream();
    // Chrome/Firefox kadang auto-suspend AudioContext setelah audio playback selesai
    // → AnalyserNode jadi diam (RMS=0) walau MediaStream masih live. Bangunin lagi.
    if (audioCtx && audioCtx.state === 'suspended') {
      try { await audioCtx.resume(); } catch (_) {}
    }
    setStatus('listening', 'menunggu suara…');
    startMediaRecorder();
    startVadLoop();
  }

  function exitConversation(silent) {
    convoActive = false;
    if (abortCtl) { try { abortCtl.abort(); } catch (_) {} }
    abortCtl = null;
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      try { mediaRecorder.onstop = null; mediaRecorder.stop(); } catch (_) {}
    }
    if (currentAudio) {
      try { currentAudio.pause(); } catch (_) {}
      currentAudio = null;
    }
    releaseStream();
    setStatus('idle', '');
    if (!silent) flashStatus('voice chat berhenti');
  }

  function flashStatus(text) {
    voiceStatus.classList.add('show');
    voiceStatusText.textContent = text;
    voiceLevelBar.style.width = '0%';
    setTimeout(() => { if (micState === 'idle') voiceStatus.classList.remove('show'); }, 1800);
  }

  async function processTurn(blob) {
    abortCtl = new AbortController();
    try {
      // 1) STT
      setStatus('processing', 'transcribing…');
      const fd = new FormData();
      const ext = recordMime.includes('mp4') ? 'm4a' : recordMime.includes('ogg') ? 'ogg' : 'webm';
      fd.append('file', blob, `voice.${ext}`);
      const trRes = await fetch('/api/transcribe', { method: 'POST', body: fd, signal: abortCtl.signal });
      if (!trRes.ok) throw new Error(`STT HTTP ${trRes.status}`);
      const trData = await trRes.json();
      const userText = (trData.text || '').trim();
      if (!userText) {
        flashStatus('(suara tidak terdeteksi)');
        if (convoActive) await beginListening();
        return;
      }

      // 2) Show user bubble + stream LLM
      const userBubble = makeRow('user', 'You');
      userBubble.textContent = userText;
      const alyaBubble = makeRow('alya', 'Alya');
      showTyping(alyaBubble);
      setStatus('chatting', 'Alya berpikir…');

      const chatRes = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: userText }),
        signal: abortCtl.signal,
      });
      if (!chatRes.ok) throw new Error(`LLM HTTP ${chatRes.status}`);
      const reader = chatRes.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      let firstChunk = true;
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        if (!chunk) continue;
        if (firstChunk) { alyaBubble.innerHTML = ''; firstChunk = false; }
        buf += chunk;
        alyaBubble.textContent = buf;
        const c = document.createElement('span');
        c.className = 'cursor';
        alyaBubble.appendChild(c);
        scrollBottom();
      }
      const cursor = alyaBubble.querySelector('.cursor');
      if (cursor) cursor.remove();
      refreshMeta();
      const alyaText = buf.trim();
      if (!alyaText) {
        alyaBubble.textContent = '(kosong — coba lagi)';
        alyaBubble.classList.add('error');
        if (convoActive) await beginListening();
        return;
      }

      // 3) TTS playback in browser
      setStatus('alya', 'Alya berbicara…');
      const ttsRes = await fetch('/api/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: alyaText }),
        signal: abortCtl.signal,
      });
      if (!ttsRes.ok) {
        console.warn('TTS HTTP', ttsRes.status);
        if (convoActive) {
          await new Promise((r) => setTimeout(r, POST_TTS_DELAY_MS));
          await beginListening();
        }
        return;
      }
      const wavBlob = await ttsRes.blob();
      const url = URL.createObjectURL(wavBlob);
      currentAudio = new Audio(url);
      await new Promise((resolve) => {
        currentAudio.onended = resolve;
        currentAudio.onerror = resolve;
        currentAudio.play().catch(resolve);
      });
      URL.revokeObjectURL(url);
      currentAudio = null;

      // 4) Loop
      if (convoActive) {
        await new Promise((r) => setTimeout(r, POST_TTS_DELAY_MS));
        await beginListening();
      }
    } catch (e) {
      if (e && e.name === 'AbortError') return;
      console.error('processTurn error:', e);
      flashStatus(`error: ${e.message || e}`);
      if (convoActive) {
        try { await beginListening(); } catch (_) {}
      } else {
        setStatus('idle', '');
      }
    }
  }

  async function enterConversation() {
    if (convoActive) return;
    if (!navigator.mediaDevices || !window.MediaRecorder) {
      alert('Browser ga support MediaRecorder/getUserMedia (butuh localhost atau HTTPS)');
      return;
    }
    convoActive = true;
    try {
      await beginListening();
    } catch (_) {
      convoActive = false;
      setStatus('idle', '');
    }
  }

  micBtn.addEventListener('click', () => {
    if (convoActive) exitConversation(false);
    else enterConversation();
  });
  micBtn.addEventListener('contextmenu', (e) => e.preventDefault());

  // Ctrl+M = toggle voice chat. Enter while listening = send now.
  window.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'm') {
      e.preventDefault();
      if (convoActive) exitConversation(false);
      else enterConversation();
      return;
    }
    if (e.key === 'Enter' && !e.shiftKey && convoActive &&
        (micState === 'listening' || micState === 'speaking') &&
        e.target !== inputEl) {
      e.preventDefault();
      pendingEndpoint = true;
    }
  });

  resetBtn.addEventListener('click', async () => {
    if (!confirm('Clear semua chat?')) return;
    try {
      await fetch('/api/reset', { method: 'POST' });
      conv.innerHTML = '';
      conv.appendChild(empty);
      refreshMeta();
    } catch (e) {
      console.error(e);
    }
  });

  refreshMeta();
  setInterval(refreshMeta, 30000);
  inputEl.focus();
</script>
</body>
</html>
