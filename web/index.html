<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alya</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #0a0712;
    --bg-1: #15101f;
    --bg-2: #1d162c;
    --border: rgba(192, 132, 252, 0.12);
    --border-strong: rgba(192, 132, 252, 0.3);
    --text: #f3e8ff;
    --text-dim: #c4b5d4;
    --text-muted: #7c7191;
    --accent: #c084fc;
    --accent-soft: #a855f7;
    --accent-glow: rgba(192, 132, 252, 0.4);
    --user-grad-1: #4c2d8c;
    --user-grad-2: #6b21a8;
    --alya-bg: rgba(192, 132, 252, 0.06);
    --danger: #f87171;
    --success: #4ade80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background:
      radial-gradient(ellipse 80% 50% at 20% 0%, rgba(168, 85, 247, 0.15), transparent),
      radial-gradient(ellipse 60% 50% at 80% 100%, rgba(236, 72, 153, 0.08), transparent),
      var(--bg-0);
    color: var(--text);
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* HEADER */
  header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(21, 16, 31, 0.6);
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    gap: 14px;
    z-index: 10;
  }
  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c084fc, #ec4899);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
    color: white;
    box-shadow: 0 0 20px var(--accent-glow);
    position: relative;
  }
  .avatar::after {
    content: '';
    position: absolute;
    bottom: 0;
    right: 0;
    width: 12px;
    height: 12px;
    background: var(--success);
    border: 2px solid var(--bg-1);
    border-radius: 50%;
  }
  .title-block { flex: 1; }
  .title-block h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .title-block .sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
    font-family: 'JetBrains Mono', monospace;
  }
  .header-actions { display: flex; gap: 8px; }
  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    font-weight: 500;
    transition: all 0.15s;
  }
  .btn-ghost:hover {
    color: var(--text);
    border-color: var(--border-strong);
    background: rgba(192, 132, 252, 0.05);
  }

  /* MESSAGES */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 32px 24px 16px;
    scroll-behavior: smooth;
  }
  main::-webkit-scrollbar { width: 8px; }
  main::-webkit-scrollbar-track { background: transparent; }
  main::-webkit-scrollbar-thumb {
    background: var(--border-strong);
    border-radius: 4px;
  }
  main::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  .conversation {
    max-width: 820px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .big-avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c084fc, #ec4899);
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 700;
    color: white;
    box-shadow: 0 0 40px var(--accent-glow);
  }
  .empty-state h2 {
    font-size: 20px;
    color: var(--text);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .empty-state p {
    font-size: 13px;
    line-height: 1.6;
  }

  .msg-row {
    display: flex;
    gap: 12px;
    animation: slideIn 0.3s ease-out;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 12px;
    color: white;
  }
  .msg-row.alya .msg-avatar {
    background: linear-gradient(135deg, #c084fc, #ec4899);
  }
  .msg-row.user .msg-avatar {
    background: linear-gradient(135deg, #4c2d8c, #1e1b4b);
    color: var(--text-dim);
  }

  .msg-content {
    max-width: 75%;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .msg-row.user .msg-content { align-items: flex-end; }

  .msg-meta {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    padding: 0 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .msg-bubble {
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.6;
    font-size: 14.5px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg-row.alya .msg-bubble {
    background: var(--alya-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }
  .msg-row.user .msg-bubble {
    background: linear-gradient(135deg, var(--user-grad-1), var(--user-grad-2));
    border-top-right-radius: 4px;
    color: white;
    box-shadow: 0 2px 12px rgba(76, 45, 140, 0.3);
  }
  .msg-bubble.error {
    background: rgba(248, 113, 113, 0.08);
    border-color: rgba(248, 113, 113, 0.3);
    color: var(--danger);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* TYPING INDICATOR */
  .typing-dots {
    display: inline-flex;
    gap: 4px;
    padding: 4px 0;
  }
  .typing-dots span {
    width: 7px;
    height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* STREAMING CURSOR */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.9s infinite;
  }
  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  /* FOOTER / INPUT */
  footer {
    border-top: 1px solid var(--border);
    background: rgba(21, 16, 31, 0.6);
    backdrop-filter: blur(20px);
    padding: 16px 24px 20px;
  }
  .input-wrap {
    max-width: 820px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-container {
    flex: 1;
    position: relative;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .input-container:focus-within {
    border-color: var(--border-strong);
    box-shadow: 0 0 0 3px rgba(192, 132, 252, 0.08);
  }
  #input {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    padding: 14px 16px;
    font-size: 14.5px;
    font-family: inherit;
    resize: none;
    min-height: 48px;
    max-height: 200px;
    outline: none;
    line-height: 1.5;
  }
  #input::placeholder { color: var(--text-muted); }

  #send {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--accent), var(--accent-soft));
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 12px rgba(192, 132, 252, 0.25);
  }
  #send:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(192, 132, 252, 0.4);
  }
  #send:active:not(:disabled) { transform: translateY(0); }
  #send:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    box-shadow: none;
  }
  #send svg { width: 20px; height: 20px; }

  .hint {
    max-width: 820px;
    margin: 8px auto 0;
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
  }

  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    main { padding: 20px 12px 12px; }
    footer { padding: 12px 16px 16px; }
    .msg-content { max-width: 82%; }
    .title-block h1 { font-size: 14px; }
    .title-block .sub { font-size: 10px; }
  }
</style>
</head>
<body>
<header>
  <div class="avatar">A</div>
  <div class="title-block">
    <h1>Alya Mikhailovna</h1>
    <div class="sub" id="meta">connecting…</div>
  </div>
  <div class="header-actions">
    <button class="btn-ghost" id="reset" title="Clear conversation">Reset</button>
  </div>
</header>

<main id="main">
  <div class="conversation" id="conversation">
    <div class="empty-state" id="empty">
      <div class="big-avatar">A</div>
      <h2>Hai…</h2>
      <p>
        Ngobrol apa hari ini?<br />
        <span style="opacity: 0.6">Inference: PC LM Studio · History: in-memory laptop</span>
      </p>
    </div>
  </div>
</main>

<footer>
  <div class="input-wrap">
    <div class="input-container">
      <textarea id="input" placeholder="Ketik pesan ke Alya…" rows="1"></textarea>
    </div>
    <button id="send" title="Kirim (Enter)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="hint">Enter untuk kirim · Shift+Enter untuk baris baru</div>
</footer>

<script>
  const conv = document.getElementById('conversation');
  const main = document.getElementById('main');
  const empty = document.getElementById('empty');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const resetBtn = document.getElementById('reset');
  const metaEl = document.getElementById('meta');

  function timeStr() {
    const d = new Date();
    return d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
  }

  function hideEmpty() {
    if (empty && empty.parentNode) empty.remove();
  }

  function makeRow(role, label) {
    hideEmpty();
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    row.innerHTML = `
      <div class="msg-avatar">${role === 'user' ? 'Y' : 'A'}</div>
      <div class="msg-content">
        <div class="msg-meta">${label} · ${timeStr()}</div>
        <div class="msg-bubble"></div>
      </div>
    `;
    conv.appendChild(row);
    scrollBottom();
    return row.querySelector('.msg-bubble');
  }

  function scrollBottom() {
    requestAnimationFrame(() => {
      main.scrollTop = main.scrollHeight;
    });
  }

  function showTyping(bubble) {
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  }

  async function refreshMeta() {
    try {
      const r = await fetch('/api/state');
      if (!r.ok) throw new Error();
      const s = await r.json();
      metaEl.textContent = `${s.model} · ${s.history_messages} pesan`;
    } catch {
      metaEl.textContent = 'server unreachable';
    }
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    const userBubble = makeRow('user', 'You');
    userBubble.textContent = text;

    const alyaBubble = makeRow('alya', 'Alya');
    showTyping(alyaBubble);

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      let firstChunk = true;

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        if (!chunk) continue;
        if (firstChunk) {
          alyaBubble.innerHTML = '';
          firstChunk = false;
        }
        buf += chunk;
        alyaBubble.textContent = buf;
        const cur = document.createElement('span');
        cur.className = 'cursor';
        alyaBubble.appendChild(cur);
        scrollBottom();
      }
      const cursor = alyaBubble.querySelector('.cursor');
      if (cursor) cursor.remove();
      if (!buf.trim()) {
        alyaBubble.textContent = '(kosong — coba lagi)';
        alyaBubble.classList.add('error');
      }
      refreshMeta();
    } catch (e) {
      alyaBubble.innerHTML = '';
      alyaBubble.textContent = `error: ${e.message}`;
      alyaBubble.classList.add('error');
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
  });
  sendBtn.addEventListener('click', sendMessage);

  resetBtn.addEventListener('click', async () => {
    if (!confirm('Clear semua chat?')) return;
    try {
      await fetch('/api/reset', { method: 'POST' });
      conv.innerHTML = '';
      conv.appendChild(empty);
      refreshMeta();
    } catch (e) {
      console.error(e);
    }
  });

  refreshMeta();
  setInterval(refreshMeta, 30000);
  inputEl.focus();
</script>
</body>
</html>
